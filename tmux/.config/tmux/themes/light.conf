# Gruvbox Light — mapped to @thm_* variables
# https://github.com/morhetz/gruvbox

set -g @theme_mode "light"

set -g @thm_bg "#fbf1c7"
set -g @thm_fg "#3c3836"
set -g @thm_mantle "#ebdbb2"
set -g @thm_crust "#d5c4a1"
set -g @thm_surface_0 "#d5c4a1"
set -g @thm_overlay_0 "#928374"
set -g @thm_red "#cc241d"
set -g @thm_maroon "#af3a03"
set -g @thm_green "#98971a"
set -g @thm_yellow "#d79921"
set -g @thm_blue "#458588"
set -g @thm_pink "#b16286"
set -g @thm_peach "#d65d0e"
set -g @thm_rosewater "#3c3836"

set -g status-style "bg=#fbf1c7"
