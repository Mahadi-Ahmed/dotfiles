# Worktrunk user config
# Stowed from dotfiles repo → ~/.config/worktrunk/config.toml

# Subfolder pattern: worktrees live inside <repo>-worktrees/<branch>
worktree-path = "{{ repo_path }}/../{{ repo }}-worktrees/{{ branch | sanitize }}"

[list]
full = true

[merge]
# Only applies to local merges (wt merge), NOT GitHub PRs
squash = true
rebase = true
remove = true

# --- Global hooks ---

[pre-start]
# Create tmux session with layout for new worktrees (runs before per-project hooks)
tmux_session = '''
if [ -n "$TMUX" ]; then
  tmux new-session -d -s "{{ branch | sanitize }}" -c "{{ worktree_path }}"
  tmux new-window -t "{{ branch | sanitize }}" -c "{{ worktree_path }}"
  tmux split-window -h -t "{{ branch | sanitize }}:2" -c "{{ worktree_path }}"
  tmux split-window -v -t "{{ branch | sanitize }}:2.2" -c "{{ worktree_path }}"
  tmux new-window -t "{{ branch | sanitize }}" -c "{{ worktree_path }}"
  tmux select-window -t "{{ branch | sanitize }}:1"
  tmux switch-client -t "{{ branch | sanitize }}"
fi
'''

# --- Per-project hooks ---

[projects."github.com/mentimeter/mm-js"]
# Archive mahadia-notes/ to ai-notes/<branch>/ before worktree is deleted
pre-remove.archive-notes = "if [ -d mahadia-notes ] && [ -n \"$(ls -A mahadia-notes)\" ]; then mkdir -p {{ repo_path }}/../{{ repo }}-worktrees/ai-notes/{{ branch | sanitize }} && cp -r mahadia-notes/* {{ repo_path }}/../{{ repo }}-worktrees/ai-notes/{{ branch | sanitize }}/ && echo '📝 Archived notes to ai-notes/{{ branch | sanitize }}'; fi"
# Install JS dependencies (via tmux pane if available, else inline)
[[projects."github.com/mentimeter/mm-js".pre-start]]
deps = '''
if [ -n "$TMUX" ]; then
  tmux send-keys -t "{{ branch | sanitize }}:1" "cd {{ worktree_path }} && yarn install && echo '📦 Installed dependencies'" Enter
else
  cd {{ worktree_path }} && yarn install && echo '📦 Installed dependencies'
fi
'''

# Copy untracked .env files from main worktree (preserving nested app structure)
[[projects."github.com/mentimeter/mm-js".pre-start]]
env = "cd {{ primary_worktree_path }} && find . \\( -name '.env' -o -name '.env.local' -o -name '.env.*.local' \\) | grep -v node_modules | while read f; do mkdir -p {{ worktree_path }}/$(dirname $f) && cp $f {{ worktree_path }}/$f; done 2>/dev/null; echo '✅ Copied .env files from main worktree'"

# Create mahadia-notes/ folder for Claude session notes
[[projects."github.com/mentimeter/mm-js".pre-start]]
notes = "mkdir -p {{ worktree_path }}/mahadia-notes && echo '📁 Created mahadia-notes/'"
# TODO: Create a hook for copying the .claude/settings.local.json from main into each wt

[projects."github.com/mentimeter/core-api"]
pre-remove.archive-notes = "if [ -d mahadia-notes ] && [ -n \"$(ls -A mahadia-notes)\" ]; then mkdir -p {{ repo_path }}/../{{ repo }}-worktrees/ai-notes/{{ branch | sanitize }} && cp -r mahadia-notes/* {{ repo_path }}/../{{ repo }}-worktrees/ai-notes/{{ branch | sanitize }}/ && echo '📝 Archived notes to ai-notes/{{ branch | sanitize }}'; fi"
# Install Ruby dependencies (via tmux pane if available, else inline)
[[projects."github.com/mentimeter/core-api".pre-start]]
deps = '''
if [ -n "$TMUX" ]; then
  tmux send-keys -t "{{ branch | sanitize }}:1" "cd {{ worktree_path }} && bundle install && echo '📦 Installed dependencies'" Enter
else
  cd {{ worktree_path }} && bundle install && echo '📦 Installed dependencies'
fi
'''

# Copy all .env.*.local files (region-specific local config)
[[projects."github.com/mentimeter/core-api".pre-start]]
env = "cd {{ primary_worktree_path }} && find . -name '.env.*.local' | grep -v node_modules | while read f; do mkdir -p {{ worktree_path }}/$(dirname $f) && cp $f {{ worktree_path }}/$f; done 2>/dev/null; echo '✅ Copied .env files from main worktree'"

# Create mahadia-notes/ folder for Claude session notes
[[projects."github.com/mentimeter/core-api".pre-start]]
notes = "mkdir -p {{ worktree_path }}/mahadia-notes && echo '📁 Created mahadia-notes/'"
